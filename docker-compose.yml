# Directus CMS — local / self-hosted only.
# Vercel plugin decision: stateful Directus is NOT for free Fluid hobby Docker.
# Production site on Vercel uses Fluid + Supabase Auth; CMS content via NEXT_PUBLIC_DIRECTUS_URL.
services:
  directus:
    image: directus/directus:12.1.4
    ports:
      - '8055:8055'
    volumes:
      - directus-uploads:/directus/uploads
      - directus-extensions:/directus/extensions
      - directus-data:/directus/database
    env_file:
      - .env.directus
    environment:
      SECRET: ${DIRECTUS_SECRET:-changeme-local-only-dev-secret-32chars}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD:-changeme-admin}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
      DB_CLIENT: sqlite3
      DB_FILENAME: /directus/database/data.db
      WEBSOCKETS_ENABLED: 'true'
      CORS_ENABLED: 'true'
      CORS_ORIGIN: ${DIRECTUS_CORS_ORIGIN:-true}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8055/server/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  directus-uploads:
  directus-extensions:
  directus-data:
