version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - maintenance
    commit-message:
      prefix: "chore(deps)"
      include: scope
    ignore:
      - dependency-name: vite
        update-types: ["version-update:semver-major"]
      - dependency-name: tailwindcss
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tailwindcss/vite"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
    labels:
      - ci
      - maintenance
    commit-message:
      prefix: "chore(actions)"
      include: scope
