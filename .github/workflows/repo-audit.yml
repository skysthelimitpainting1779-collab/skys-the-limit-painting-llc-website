name: Repository Audit

# Lean: list stale branches via gh (no audit-repo.mjs theater).
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  audit-branches:
    name: List stale branches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Stale local tracking branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --prune origin || true
          echo "Remote branches:"
          git branch -r --sort=-committerdate | head -40
          echo "Open PRs:"
          gh pr list --limit 20 || true
