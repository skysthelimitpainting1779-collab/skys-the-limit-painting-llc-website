name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Node.js
        uses: actions/setup-node@60a2fcb4275a27807c4509439348d6557ad057fb # v4.0.3
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Review dependencies
        uses: actions/dependency-review-action@72eb03d029072227d405508a0d81c9b67100b51f # v4.3.4
        with:
          fail-on-severity: moderate

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4f3212b617ae51da4151756543b593f6630f9a74 # v3.25.10
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@4f3212b617ae51da4151756543b593f6630f9a74 # v3.25.10

      - name: Analyze
        uses: github/codeql-action/analyze@4f3212b617ae51da4151756543b593f6630f9a74 # v3.25.10
