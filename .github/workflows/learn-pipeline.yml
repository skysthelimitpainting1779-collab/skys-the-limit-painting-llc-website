name: Learning Pipeline

# Lean: after CI, rebuild active prevention only. No learn-pipeline theater.
on:
  workflow_run:
    workflows: ['CI Pipeline']
    types: [completed]
  workflow_dispatch:

concurrency:
  group: learn-pipeline-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  HOOKS_SKIP: '1'
  ENTIRE_SYNC_SKIP: '1'
  GRAPHIFY_SKIP_HOOK: '1'

jobs:
  prevent:
    name: Rebuild active prevention
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'cancelled')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - name: Prevention self-test + rebuild
        run: |
          npm run learn:prevent:test
          npm run learn:prevent:rebuild
