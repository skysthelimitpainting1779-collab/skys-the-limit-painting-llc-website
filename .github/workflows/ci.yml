name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: no bot pushes. Preview deploys are Vercel Git integration.
permissions:
  contents: read
  pull-requests: write

env:
  SITE_URL: https://skysthelimitpaintingllc.com
  # Skip agent/entire side-effects in CI
  HOOKS_SKIP: '1'
  ENTIRE_SYNC_SKIP: '1'
  GRAPHIFY_SKIP_HOOK: '1'
  AGENT_OS_SKIP_SCAN: '1'

jobs:
  # ── 0) Git standards (branch prefix + conventional commits) ─────────────
  git-guard:
    name: '0 · Git standards'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'

      - name: Enforce branch + commit policy
        env:
          GIT_GUARD_STRICT: '1'
        run: node scripts/enforce-git.js

  # ── 1) Quality: types, markdown, knip, tests, build (one install) ───────
  quality:
    name: '1 · Quality (lint · knip · test · build)'
    runs-on: ubuntu-latest
    needs: git-guard
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: React version pin check
        run: npm run lint:react

      - name: TypeScript (tsc --noEmit)
        run: npm run lint:types

      - name: Markdownlint
        run: npm run lint:md

      - name: Knip (unused files/deps)
        run: npm run lint:knip

      - name: Agent OS bootstrap + tests
        run: node scripts/agent-os.js bootstrap && npm test

      - name: Next.js production build
        run: npm run build
        env:
          SITE_URL: ${{ env.SITE_URL }}

      - name: Failure guidance
        if: failure()
        run: |
          echo "::error::Quality job failed. Fix locally with:"
          echo "  npm ci"
          echo "  npm run lint:ci"
          echo "  node scripts/agent-os.js bootstrap && npm test"
          echo "  npm run build"
          echo "Git policy: no bot auto-commits. Push fixes on your branch."

  # Learning is coordinated in learn-pipeline.yml via workflow_run after this
  # pipeline completes (success or failure) → Entire codify → Turso schema.

  # ── Note: PR Automation (branch normalize · Vercel · auto-review) is ─────
  #     .github/workflows/pr-automation.yml (runs on pull_request in parallel)
