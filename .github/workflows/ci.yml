name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: "24.x"
  SITE_URL: https://skysthelimitpaintingllc.com
  VERCEL_ORG_ID: team_bseTA2AuCO6A2fCOVY9ubrJo
  VERCEL_PROJECT_ID: prj_L3ZMoQ79YLx9G2o6Lg9OubqO9H8m
  LEAD_TO_EMAIL: skysthelimitpainting1779@gmail.com
  LEAD_FROM_EMAIL: "Sky Leads <onboarding@resend.dev>"

jobs:
  lint:
    name: "① Lint (TypeScript)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run TypeScript type check
        run: npm run lint

      - name: "Report CI failure (Git Discipline: no auto commits/pushes)"
        if: failure()
        run: |
          echo "::error::Lint job failed. Check logs and run URL for exact errors."
          echo "Git policy: NO bot commits or pushes allowed. Fix on branch locally."
          echo "Steps: npm run lint && npm test && npm run build, then commit + push."

  test:
    name: "② Test (Node test runner)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run test suite
        run: node scripts/agent-os.js bootstrap && npm test

      - name: "Report CI failure (Git Discipline: no auto commits/pushes)"
        if: failure()
        run: |
          echo "::error::Test job failed. Check logs and run URL for exact test failures."
          echo "Git policy: NO bot commits or pushes allowed. Fix on branch locally."
          echo "Steps: npm run lint && npm test && npm run build, then commit + push."

  build:
    name: "③ Build (Next.js)"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Build Next.js app
        run: npm run build

      - name: "Report CI failure (Git Discipline: no auto commits/pushes)"
        if: failure()
        run: |
          echo "::error::Build job failed. Check logs and run URL for Next.js build errors."
          echo "Git policy: NO bot commits or pushes allowed. Fix on branch locally."
          echo "Steps: npm run lint && npm test && npm run build, then commit + push."
