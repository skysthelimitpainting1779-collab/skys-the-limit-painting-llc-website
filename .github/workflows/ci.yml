name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: read-only repo access. The pipeline never pushes
# commits (git-discipline policy); it only comments preview URLs on PRs.
permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '24.x'
  SITE_URL: https://skysthelimitpaintingllc.com
  VERCEL_ORG_ID: team_bseTA2AuCO6A2fCOVY9ubrJo
  VERCEL_PROJECT_ID: prj_L3ZMoQ79YLx9G2o6Lg9OubqO9H8m
  LEAD_TO_EMAIL: skysthelimitpainting1779@gmail.com
  LEAD_FROM_EMAIL: 'Sky Leads <onboarding@resend.dev>'

jobs:
  lint:
    name: '① Lint (TypeScript)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run TypeScript type check
        run: npm run lint

      - name: 'Report CI failure (Git Discipline: no auto commits/pushes)'
        if: failure()
        run: |
          echo "::error::Lint job failed. Check logs and run URL for exact errors."
          echo "Git policy: NO bot commits or pushes allowed. Fix on branch locally."
          echo "Steps: npm run lint && npm test && npm run build, then commit + push."

  test:
    name: '② Test (Node test runner)'
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run test suite
        run: node scripts/agent-os.js bootstrap && npm test

      - name: 'Report CI failure (Git Discipline: no auto commits/pushes)'
        if: failure()
        run: |
          echo "::error::Test job failed. Check logs and run URL for exact test failures."
          echo "Git policy: NO bot commits or pushes allowed. Fix on branch locally."
          echo "Steps: npm run lint && npm test && npm run build, then commit + push."

  build:
    name: '③ Build (Next.js)'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Restore Next.js build cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'src/**/*.js', 'src/**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Build Next.js app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nextjs-build-${{ github.sha }}
          path: |
            .next/
            !.next/cache
          retention-days: 1
          include-hidden-files: true

      - name: 'Report CI failure (Git Discipline: no auto commits/pushes)'
        if: failure()
        run: |
          echo "::error::Build job failed. Check logs and run URL for Next.js build errors."
          echo "Git policy: NO bot commits or pushes allowed. Fix on branch locally."
          echo "Steps: npm run lint && npm test && npm run build, then commit + push."

  deploy-preview:
    name: '④ Deploy Preview (Vercel)'
    runs-on: ubuntu-latest
    needs: build
    if: >
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/staging'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true' && env.VERCEL_TOKEN != ''
        run: npm ci

      - name: Download pre-built artifact
        if: env.VERCEL_TOKEN != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/

      - name: Pull Vercel environment (preview)
        if: env.VERCEL_TOKEN != ''
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel deployment package
        if: env.VERCEL_TOKEN != ''
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel preview
        if: env.VERCEL_TOKEN != ''
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && env.VERCEL_TOKEN != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber  = context.payload.pull_request.number;
            const deployUrl = '${{ steps.deploy.outputs.url }}';
            const sha       = '${{ github.sha }}'.slice(0, 7);
            const body = [
              `## 🚀 Vercel Preview Deployment`,
              ``,
              `**URL:** [${deployUrl}](${deployUrl})`,
              `**Commit:** \`${sha}\``,
              `**Status:** ✅ All checks passed (Lint → Test → Build → Deploy)`,
              ``,
              `> Deployed via the CI/CD pipeline.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes('Vercel Preview Deployment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: 'Report CI failure (Git Discipline: no auto commits/pushes)'
        if: failure()
        run: |
          echo "::error::Deploy (preview) job failed. Check logs for Vercel error."
          echo "Git policy: NO bot commits or pushes allowed. Fix on branch locally."
          echo "Verify secrets (VERCEL_TOKEN) and env vars in Vercel dashboard."

  deploy-production:
    name: '⑤ Deploy Production (Vercel)'
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore node_modules cache
        id: cache-nm
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nm-

      - name: Install dependencies
        if: steps.cache-nm.outputs.cache-hit != 'true' && env.VERCEL_TOKEN != ''
        run: npm ci

      - name: Download pre-built artifact
        if: env.VERCEL_TOKEN != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/

      - name: Pull Vercel environment (production)
        if: env.VERCEL_TOKEN != ''
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel production package
        if: env.VERCEL_TOKEN != ''
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel production
        if: env.VERCEL_TOKEN != ''
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 'Report CI failure (Git Discipline: no auto commits/pushes)'
        if: failure()
        run: |
          echo "::error::CRITICAL: Production deploy failed. Site may be out of date."
          echo "Git policy: NO bot commits allowed (especially not on main). Investigate in Vercel dashboard."
          echo "Use workflow_dispatch or staging first. Do not force push to main."
