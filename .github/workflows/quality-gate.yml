name: Quality Gate

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

env:
  VITE_SITE_URL: https://skysthelimitpaintingllc.com
  LEAD_TO_EMAIL: skysthelimitpainting1779@gmail.com
  LEAD_FROM_EMAIL: Sky Leads <onboarding@resend.dev>

jobs:
  quality:
    name: PR Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
