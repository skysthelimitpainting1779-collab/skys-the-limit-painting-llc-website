name: Quality Gate

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

env:
  VITE_SITE_URL: https://skysthelimitpaintingllc.com
  LEAD_TO_EMAIL: skysthelimitpainting1779@gmail.com
  LEAD_FROM_EMAIL: Sky Leads <onboarding@resend.dev>

jobs:
  quality:
    name: PR Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@60a2fcb4275a27807c4509439348d6557ad057fb # v4.0.3
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Architecture tests
        run: node --test tests/site-architecture.test.mjs

      - name: Build
        run: npm run build
