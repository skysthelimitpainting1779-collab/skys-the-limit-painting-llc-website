name: PR Automation

# Branch normalize · PR title · labels · Vercel verify · auto-review · sticky dashboard · all-green
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, edited, labeled, unlabeled]
    branches: [main, staging]

concurrency:
  group: pr-auto-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  deployments: read
  statuses: read
  checks: read

env:
  HOOKS_SKIP: '1'
  ENTIRE_SYNC_SKIP: '1'
  GRAPHIFY_SKIP_HOOK: '1'
  VERCEL_ORG_ID: team_bseTA2AuCO6A2fCOVY9ubrJo
  VERCEL_PROJECT_ID: prj_L3ZMoQ79YLx9G2o6Lg9OubqO9H8m

jobs:
  # ── Branch name normalize ───────────────────────────────────────────────
  branch-normalize:
    name: Branch normalize
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      plan: ${{ steps.plan.outputs.json }}
      normalized: ${{ steps.plan.outputs.normalized }}
      needs_rename: ${{ steps.plan.outputs.needs_rename }}
      original: ${{ steps.plan.outputs.original }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'
      - id: plan
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: |
          node scripts/normalize-branch.mjs --json > /tmp/branch-plan.json || true
          cat /tmp/branch-plan.json
          echo "json=$(jq -c . /tmp/branch-plan.json)" >> "$GITHUB_OUTPUT"
          echo "normalized=$(jq -r .normalized /tmp/branch-plan.json)" >> "$GITHUB_OUTPUT"
          echo "original=$(jq -r .original /tmp/branch-plan.json)" >> "$GITHUB_OUTPUT"
          if [ "$(jq -r .action /tmp/branch-plan.json)" = "rename" ]; then
            echo "needs_rename=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_rename=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Rename branch
        if: steps.plan.outputs.needs_rename == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          BRANCH_NORMALIZE_APPLY: '1'
        run: |
          if node scripts/normalize-branch.mjs --apply --json; then
            gh pr comment ${{ github.event.pull_request.number }} --body "## Branch normalized

          \`${{ steps.plan.outputs.original }}\` → \`${{ steps.plan.outputs.normalized }}\`

          Prefixes: \`feat/\` \`fix/\` \`chore/\` \`docs/\` \`infra/\` \`agent/\` \`devin/\`"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "## Rename branch manually

          Suggested: \`${{ steps.plan.outputs.normalized }}\`

          \`\`\`bash
          git branch -m ${{ steps.plan.outputs.normalized }}
          git push -u origin ${{ steps.plan.outputs.normalized }}
          git push origin --delete ${{ github.head_ref }}
          \`\`\`" || true
            exit 1
          fi

  # ── PR title conventional commit ────────────────────────────────────────
  pr-title:
    name: PR title
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.lint.outputs.result }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'
      - id: lint
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          node scripts/pr-title-lint.mjs --fix | tee /tmp/title.json
          CODE=$?
          echo "result=$(jq -c . /tmp/title.json)" >> "$GITHUB_OUTPUT"
          # non-blocking title fix attempt; fail soft on draft
          if [ "${{ github.event.pull_request.draft }}" = "true" ]; then exit 0; fi
          exit 0

  # ── Path + size labels ─────────────────────────────────────────────────
  labels:
    name: Labels
    runs-on: ubuntu-latest
    needs: [branch-normalize, vercel-verify]
    if: always() && needs.branch-normalize.result != 'cancelled'
    outputs:
      result: ${{ steps.label.outputs.result }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'
      - id: label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          PREVIEW_READY: ${{ needs.vercel-verify.outputs.ready }}
          NEEDS_BRANCH_RENAME: ${{ needs.branch-normalize.outputs.needs_rename }}
        run: |
          if [ "${PREVIEW_READY}" != "true" ]; then export PREVIEW_PENDING=1; fi
          node scripts/pr-label.mjs | tee /tmp/labels.json
          echo "result=$(jq -c . /tmp/labels.json)" >> "$GITHUB_OUTPUT"

  # ── Vercel preview verified ─────────────────────────────────────────────
  vercel-verify:
    name: Vercel preview verified
    runs-on: ubuntu-latest
    needs: [branch-normalize]
    if: always() && needs.branch-normalize.result != 'cancelled'
    outputs:
      result: ${{ steps.verify.outputs.result }}
      url: ${{ steps.verify.outputs.url }}
      ready: ${{ steps.verify.outputs.ready }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'
      - id: verify
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          if [ -z "$VERCEL_TOKEN" ]; then
            echo 'result={"ok":false,"skipped":true,"error":"VERCEL_TOKEN not configured"}' >> "$GITHUB_OUTPUT"
            echo "url=" >> "$GITHUB_OUTPUT"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN missing"
            exit 0
          fi
          node scripts/verify-vercel-deployment.mjs --timeout 720 --interval 15 | tee /tmp/vercel.json
          CODE=${PIPESTATUS[0]}
          echo "result=$(jq -c . /tmp/vercel.json)" >> "$GITHUB_OUTPUT"
          URL=$(jq -r '.url // empty' /tmp/vercel.json)
          OK=$(jq -r '.ok // false' /tmp/vercel.json)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          if [ "$OK" = "true" ]; then echo "ready=true" >> "$GITHUB_OUTPUT"; else echo "ready=false" >> "$GITHUB_OUTPUT"; fi
          exit $CODE

  # ── Auto review ─────────────────────────────────────────────────────────
  auto-review:
    name: Auto PR review
    runs-on: ubuntu-latest
    needs: [branch-normalize, vercel-verify, pr-title]
    if: always() && needs.branch-normalize.result != 'cancelled'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'
      - name: CI quality conclusion
        id: ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          CONC=$(gh api "repos/${{ github.repository }}/commits/${SHA}/check-runs" --paginate \
            --jq '[.check_runs[] | select(.name | test("Quality|quality|lint|CI/CD"; "i"))] | map(.conclusion) | if any(.=="failure") then "failure" elif any(.=="success") then "success" else "unknown" end' \
            2>/dev/null || echo "unknown")
          echo "conclusion=$CONC" >> "$GITHUB_OUTPUT"
      - name: Review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          BRANCH_NORMALIZE_JSON: ${{ needs.branch-normalize.outputs.plan }}
          VERCEL_VERIFY_JSON: ${{ needs.vercel-verify.outputs.result }}
          VERCEL_PREVIEW_URL: ${{ needs.vercel-verify.outputs.url }}
          CI_QUALITY_CONCLUSION: ${{ steps.ci.outputs.conclusion }}
        run: |
          set +e
          node scripts/pr-auto-review.mjs
          CODE=$?
          [ "$CODE" -eq 2 ] && exit 0
          exit $CODE

  # ── Sticky dashboard comment ────────────────────────────────────────────
  dashboard:
    name: Sticky PR dashboard
    runs-on: ubuntu-latest
    needs: [branch-normalize, vercel-verify, pr-title, labels, auto-review]
    if: always() && needs.branch-normalize.result != 'cancelled'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'
      - name: Build + upsert sticky comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
          BRANCH_NORMALIZE_JSON: ${{ needs.branch-normalize.outputs.plan }}
          VERCEL_VERIFY_JSON: ${{ needs.vercel-verify.outputs.result }}
          PR_LABELS_JSON: ${{ needs.labels.outputs.result }}
          PR_TITLE_JSON: ${{ needs.pr-title.outputs.result }}
          CI_QUALITY_CONCLUSION: unknown
        run: |
          node scripts/pr-dashboard.mjs > /tmp/dash.md
          node scripts/pr-sticky-comment.mjs --marker agent-os-dashboard --body-file /tmp/dash.md

  # ── Single status for branch protection ─────────────────────────────────
  all-green:
    name: PR automation all green
    runs-on: ubuntu-latest
    needs: [branch-normalize, pr-title, vercel-verify, auto-review, labels, dashboard]
    if: always()
    steps:
      - name: Aggregate
        run: |
          echo "branch-normalize: ${{ needs.branch-normalize.result }}"
          echo "pr-title: ${{ needs.pr-title.result }}"
          echo "vercel-verify: ${{ needs.vercel-verify.result }}"
          echo "auto-review: ${{ needs.auto-review.result }}"
          echo "labels: ${{ needs.labels.result }}"
          echo "dashboard: ${{ needs.dashboard.result }}"

          # Fail if branch rename failed or Vercel hard-failed (not skipped)
          BN="${{ needs.branch-normalize.result }}"
          VV="${{ needs.vercel-verify.result }}"
          AR="${{ needs.auto-review.result }}"

          if [ "$BN" = "failure" ]; then
            echo "::error::Branch normalization failed"
            exit 1
          fi
          # Vercel: failure only if token present and deploy failed
          if [ "$VV" = "failure" ]; then
            echo "::error::Vercel verification failed"
            exit 1
          fi
          if [ "$AR" = "failure" ]; then
            echo "::error::Auto review job failed"
            exit 1
          fi
          echo "PR automation gate: GREEN"
