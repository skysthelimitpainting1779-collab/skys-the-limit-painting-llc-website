name: PR Automation

# Lean: branch normalize + Vercel verify only (no title/label/dashboard theater scripts).
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main, staging]

concurrency:
  group: pr-auto-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  deployments: read
  statuses: read
  checks: read

env:
  HOOKS_SKIP: '1'
  ENTIRE_SYNC_SKIP: '1'
  GRAPHIFY_SKIP_HOOK: '1'
  VERCEL_ORG_ID: team_bseTA2AuCO6A2fCOVY9ubrJo
  VERCEL_PROJECT_ID: prj_L3ZMoQ79YLx9G2o6Lg9OubqO9H8m

jobs:
  branch-normalize:
    name: Branch normalize
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'
      - name: Plan + optional rename
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/normalize-branch.mjs --json || true
          BRANCH_NORMALIZE_APPLY=1 node scripts/normalize-branch.mjs --apply --json || true

  vercel-verify:
    name: Vercel verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version-file: '.nvmrc'
      - name: Wait for deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/verify-vercel-deployment.mjs --timeout 720 --interval 15 || true
