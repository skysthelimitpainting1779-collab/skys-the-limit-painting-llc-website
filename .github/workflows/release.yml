name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  VITE_SITE_URL: https://skysthelimitpaintingllc.com
  LEAD_TO_EMAIL: skysthelimitpainting1779@gmail.com
  LEAD_FROM_EMAIL: Sky Leads <onboarding@resend.dev>

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci
      - name: Validate
        run: |
          npm run lint
          npm test
          npm run build
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/**
