name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  VITE_SITE_URL: https://skysthelimitpaintingllc.com
  LEAD_TO_EMAIL: skysthelimitpainting1779@gmail.com
  LEAD_FROM_EMAIL: Sky Leads <onboarding@resend.dev>

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run lint
          node --test tests/site-architecture.test.mjs
          npm run build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**
